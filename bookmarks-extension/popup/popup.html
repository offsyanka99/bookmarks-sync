<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bookmarks Sync</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <img src="../icons/icon32.png" alt="" width="20" height="20" />
        <strong>Bookmarks Sync</strong>
      </div>
      <a href="../options/options.html" target="_blank" class="link" id="open-settings">Settings</a>
    </header>

    <section class="status card" id="status-card">
      <div class="row">
        <span class="label">Server</span>
        <span class="value mono" id="server-url">—</span>
      </div>
      <div class="row">
        <span class="label">API key</span>
        <span class="value" id="api-key-state">—</span>
      </div>
      <div class="row">
        <span class="label">Last sync</span>
        <span class="value" id="last-sync">Never</span>
      </div>
      <div class="row">
        <span class="label">Status</span>
        <span class="value" id="sync-status">—</span>
      </div>
    </section>

    <section class="actions">
      <button type="button" class="btn btn-primary" id="btn-sync">Sync now</button>
      <button type="button" class="btn btn-ghost" id="btn-test">Test connection</button>
    </section>

    <pre class="log" id="log" hidden></pre>

    <footer class="footer muted">
      Brave / Chrome · self-hosted
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
