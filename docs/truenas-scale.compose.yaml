# Bookmarks Sync — TrueNAS SCALE custom app example (Docker Compose YAML)
#
# Use: Apps → Discover apps → Custom App / Install via YAML
# (Electric Eel / 24.10+ Docker-based SCALE)
#
# Before deploy:
#   1. Create a dataset, e.g. tank/apps/bookmarks-sync
#   2. Fix ownership for TrueNAS Apps user (uid/gid 568) — REQUIRED or you get:
#        EACCES: permission denied, mkdir '/app/data/logs'
#      On TrueNAS shell (System → Shell), run:
#        mkdir -p /mnt/tank/apps/bookmarks-sync
#        chown -R 568:568 /mnt/tank/apps/bookmarks-sync
#      (568 = "apps" user on TrueNAS SCALE; confirm with: id apps)
#   3. Adjust host path under volumes: and host ports if needed
#   4. No ADMIN_PASSWORD / SESSION_SECRET required in this file
#   5. Optional: SESSION_MAX_AGE_MINUTES (admin idle timeout, default 15)
#
# After deploy (first run):
#   1. Open Admin UI:  http://NAS-IP:31040
#   2. You are redirected to /setup — set password for user "admin"
#   3. Copy the API key shown once, then log in at /login
#   4. API (extensions): http://NAS-IP:31039  (not the admin port)
#
# Optional recovery (if you forget the admin password): set ADMIN_PASSWORD and
# RESET_ADMIN_PASSWORD=true once, restart, then remove those env vars.
#
# Docs: README.md → Docker / TrueNAS · Extension: bookmarks-extension/README.md

services:
  bookmarks-sync:
    # TrueNAS SCALE Apps user (not the image default uid 1001)
    user: "568:568"
    # --- Image source (pick one) -------------------------------------------
    # A) Build from GitHub (NAS needs outbound access to GitHub)
    build:
      context: https://github.com/offsyanka99/bookmarks-sync.git#main
    # B) Or use a pre-built image you pushed (comment out build: above):
    # image: ghcr.io/YOURUSER/bookmarks-sync:1.2.1

    container_name: bookmarks-sync
    restart: unless-stopped

    # Resource caps (some SCALE versions prefer UI fields instead)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    ports:
      # Host:Container
      # Container ports must match SERVER_PORT / ADMIN_PORT below
      - "31039:31059" # API  → browser extensions
      - "31040:31060" # Admin web UI

    environment:
      NODE_ENV: production
      # Bind inside the container — keep 0.0.0.0 (do NOT set to the NAS LAN IP)
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "31059"
      ADMIN_PORT: "31060"
      # Optional: only for nicer startup log URLs (not required for the app to work)
      # PUBLIC_HOST: "10.10.20.40"
      # PUBLIC_API_PORT: "31039"    # host-mapped API port
      # PUBLIC_ADMIN_PORT: "31040"  # host-mapped admin port

      # Admin credentials are NOT set here.
      # First open of the admin UI → /setup → choose password for user "admin".
      # SESSION_SECRET is auto-generated into the data volume (.session-secret).
      # Optional overrides (uncomment only if you need them):
      # ADMIN_USERNAME: admin
      # ADMIN_PASSWORD: "your-strong-password"   # headless bootstrap; avoid $ in Compose
      # SESSION_SECRET: "from-openssl-rand-hex-32"
      # RESET_ADMIN_PASSWORD: "false"

      # Admin session idle timeout (minutes). Cookie is rolling while the UI is used.
      # Raise (e.g. "60") if 15 minutes is too short for your workflow.
      SESSION_MAX_AGE_MINUTES: "15"

      DB_PATH: /app/data/bookmarks.db
      LOG_DIR: /app/data/logs
      LOG_TO_STDOUT: "true"
      LOG_TO_FILE: "true"
      LOG_STDOUT_FORMAT: json
      LOG_LEVEL: info
      LOG_MAX_FILES: "14d"
      LOG_MAX_SIZE: "20m"

      ALLOW_NEW_SYNCS: "true"
      MAX_SYNC_SIZE_BYTES: "1048576"
      STATUS_MESSAGE: "Bookmarks Sync service is online"

      # Empty is fine for native extension clients
      CORS_ORIGINS: ""
      # true when behind Traefik/Caddy/nginx so rate limits see real client IPs
      TRUST_PROXY: "false"
      # true only when admin UI is served over HTTPS.
      # Leave false on plain HTTP LAN — true enables CSP upgrade-to-HTTPS and breaks CSS.
      COOKIE_SECURE: "false"

    volumes:
      # CHANGE THIS to your TrueNAS dataset path
      # Must be chown 568:568 (TrueNAS apps user — see header) — not root-only
      # Stores SQLite DB, logs, and auto-generated .session-secret
      - /mnt/tank/apps/bookmarks-sync:/app/data

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:31059/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
