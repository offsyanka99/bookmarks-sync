services:
  bookmarks-sync:
    build: .
    container_name: bookmarks-sync
    ports:
      - "${SERVER_PORT:-31059}:31059"
      - "${ADMIN_PORT:-31060}:31060"
    environment:
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "31059"
      ADMIN_PORT: "31060"
      # Optional: headless first admin (otherwise open admin UI → /setup)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Optional: override; if empty, auto-generated under /app/data/.session-secret
      SESSION_SECRET: ${SESSION_SECRET:-}
      DB_PATH: /app/data/bookmarks.db
      STATUS_MESSAGE: ${STATUS_MESSAGE:-Bookmarks Sync service is online}
      ALLOW_NEW_SYNCS: ${ALLOW_NEW_SYNCS:-true}
      MAX_SYNC_SIZE_BYTES: ${MAX_SYNC_SIZE_BYTES:-1048576}
      # Comma-separated browser origins, or leave empty for no CORS (curl/extension-friendly)
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # Set true when behind a reverse proxy so rate limits see real client IPs
      TRUST_PROXY: ${TRUST_PROXY:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: /app/data/logs
      LOG_TO_STDOUT: "true"
      LOG_TO_FILE: "true"
      LOG_STDOUT_FORMAT: json
      LOG_MAX_FILES: ${LOG_MAX_FILES:-14d}
      LOG_MAX_SIZE: ${LOG_MAX_SIZE:-20m}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      NODE_ENV: production
    volumes:
      - bookmarks-data:/app/data
    # Dozzle reads Docker container stdout/stderr — keep LOG_TO_STDOUT=true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:31059/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  bookmarks-data:
